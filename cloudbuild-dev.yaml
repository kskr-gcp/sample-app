steps:
  - name: 'gcr.io/cloud-builders/go'
    env: ['GOPATH=/gopath']
    args: ['build', '-o', 'main', 'main.go']

  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t',
      'us-west1-docker.pkg.dev/qwiklabs-gcp-02-f55f879b4460/my-repository/hello-cloudbuild-dev:v2.0',
      '.'
    ]

  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      'us-west1-docker.pkg.dev/qwiklabs-gcp-02-f55f879b4460/my-repository/hello-cloudbuild-dev:v2.0'
    ]

  - name: 'gcr.io/cloud-builders/kubectl'
    args: ['-n', 'dev', 'apply', '-f', 'dev/deployment.yaml']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-west1-b'
      - 'CLOUDSDK_CONTAINER_CLUSTER=hello-cluster'

options:
  logging: CLOUD_LOGGING_ONLY